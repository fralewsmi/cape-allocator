service: cape-allocator-api

frameworkVersion: "3"

provider:
  name: aws
  runtime: python3.12
  stage: dev
  region: us-east-1
  environment:
    FRED_API_KEY: ${env:FRED_API_KEY}
    CORS_ORIGINS: ${env:CORS_ORIGINS, ""}
    CAPE_CACHE_DIR: /tmp/cape_allocator
    CAPE_CACHE_TTL_HOURS: 24

functions:
  api:
    handler: api.main.handler
    events:
      - http:
          path: /
          method: ANY
          cors: true
      - http:
          path: /{proxy+}
          method: ANY
          cors: true

plugins:
  - serverless-python-requirements

custom:
  pythonRequirements:
    dockerizePip: true
